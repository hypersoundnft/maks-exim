<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAKS — Letter of Credit</title>
<style>
  :root{
    --bg:#0a0a0a;
    --panel:#1c1c1c;
    --panel-2:#262626;
    --field:#161616;
    --border:#333333;
    --border-soft:#2a2a2a;
    --text:#f5f5f5;
    --text-dim:#9a9a9a;
    --text-faint:#6a6a6a;
    --navy:#0e0e52;
    --navy-2:#15166e;
    --teal:#0090b5;
    --teal-2:#1ca7c4;
    --teal-glow:#1ca7c41a;
    --green:#3aa66b;
    --green-soft:#173a26;
    --amber:#caa23a;
    --amber-soft:#3a2f12;
    --red-soft:#3a1a1a;
    --radius:10px;
    --radius-lg:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  body{display:flex;flex-direction:column;min-height:100vh;}
  a{color:var(--teal-2);text-decoration:none;}

  /* ---------- NAV ---------- */
  .navbar{
    background:var(--bg);
    border-bottom:1px solid var(--border-soft);
    padding:14px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .navbar .left{display:flex;align-items:center;gap:28px;}
  .logo{font-weight:700;font-size:18px;letter-spacing:1px;color:#fff;}
  .navlinks{display:flex;gap:22px;font-size:13px;color:var(--text-dim);}
  .navlinks span.active{color:#fff;font-weight:600;}
  .navbar .right{display:flex;align-items:center;gap:14px;}
  .role-pill{
    display:flex;background:var(--panel-2);border-radius:20px;padding:3px;border:1px solid var(--border-soft);
  }
  .role-pill button{
    border:none;background:transparent;color:var(--text-dim);font-size:12px;font-weight:600;
    padding:6px 14px;border-radius:18px;cursor:pointer;letter-spacing:.3px;transition:all .15s;
  }
  .role-pill button.active{background:var(--teal-2);color:#04212b;}
  .icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:14px;border:1px solid var(--border-soft);background:var(--panel-2);}

  /* ---------- CONNECTION STATUS ---------- */
  .conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
  .conn-dot.online{background:var(--green);box-shadow:0 0 6px var(--green);}
  .conn-dot.offline{background:#cc4444;box-shadow:0 0 6px #cc4444;}
  .conn-status{font-size:11px;color:var(--text-faint);display:flex;align-items:center;gap:4px;}

  /* ---------- LAYOUT ---------- */
  .app{display:flex;flex:1;}
  .sidebar{
    width:300px;flex:none;background:#111111;border-right:1px solid var(--border-soft);
    padding:24px 18px;overflow-y:auto;
  }
  .main{flex:1;padding:32px 40px;max-width:760px;}

  .deal-header{margin-bottom:22px;}
  .deal-header .eyebrow{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--teal-2);font-weight:700;margin-bottom:6px;}
  .deal-header h1{font-size:22px;margin:0 0 6px;font-weight:700;}
  .deal-header .sub{font-size:13px;color:var(--text-dim);}

  /* ---------- TIMELINE (sidebar) ---------- */
  .sidebar h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);margin:4px 0 18px;font-weight:700;}
  .lane-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px 0;font-weight:700;}
  .timeline{position:relative;}
  .tl-node{
    position:relative;padding:10px 12px 10px 34px;margin-bottom:4px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;transition:all .15s;
  }
  .tl-node:hover{background:var(--panel);}
  .tl-node.selected{background:var(--panel-2);border-color:var(--border);}
  .tl-node::before{
    content:'';position:absolute;left:10px;top:14px;width:10px;height:10px;border-radius:50%;
    background:var(--text-faint);border:2px solid var(--bg);
  }
  .tl-node::after{
    content:'';position:absolute;left:14px;top:24px;width:2px;height:calc(100% + 4px);
    background:var(--border-soft);
  }
  .tl-node:last-child::after{display:none;}
  .tl-node .who{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);font-weight:700;}
  .tl-node .what{font-size:13px;color:var(--text-dim);margin-top:1px;}
  .tl-node .holder{display:inline-flex;align-items:center;gap:4px;font-size:10px;margin-top:5px;padding:2px 7px;border-radius:10px;background:#1f1f1f;color:var(--text-faint);}

  .tl-node.done::before{background:var(--green);}
  .tl-node.done .what{color:var(--text);}
  .tl-node.current::before{background:var(--teal-2);box-shadow:0 0 0 3px var(--teal-glow);}
  .tl-node.current{background:var(--panel);border-color:var(--teal-2);}
  .tl-node.current .what{color:#fff;font-weight:600;}
  .tl-node.current::after{background:linear-gradient(var(--teal-2),var(--border-soft));}
  .tl-node.icc .who{color:#c89a6a;}
  .tl-node.exporter .who{color:var(--teal-2);}
  .tl-node.importer .who{color:#9a9a9a;}
  .tl-node.role-dim{opacity:.38;}

  .holder-pill{display:flex;gap:6px;align-items:center;margin:16px 0 0;padding:10px 12px;background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;}
  .holder-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--teal-2);box-shadow:0 0 0 3px var(--teal-glow);}
  .holder-pill .label{font-size:11px;color:var(--text-faint);}
  .holder-pill .val{font-size:13px;font-weight:600;}

  /* ---------- DETAIL PANEL ---------- */
  .card{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:24px 26px;margin-bottom:18px;}
  .card h3{margin:0 0 4px;font-size:17px;font-weight:700;}
  .card .meta{font-size:12px;color:var(--text-faint);margin-bottom:18px;}
  .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.3px;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
  .status-badge.done{background:var(--green-soft);color:#6fcf97;}
  .status-badge.current{background:#163844;color:var(--teal-2);}
  .status-badge.pending{background:#222;color:var(--text-faint);}

  label{display:block;font-size:12px;color:var(--text-dim);margin:14px 0 6px;font-weight:600;}
  input[type=text],input[type=number],select,textarea{
    width:100%;background:var(--field);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;
  }
  input::placeholder,textarea::placeholder{color:var(--text-faint);}
  textarea{resize:vertical;min-height:64px;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border-radius:24px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s;
  }
  .btn-primary{background:var(--teal-2);color:#04212b;}
  .btn-primary:hover{background:#1fbcdb;}
  .btn-outline{background:transparent;border:1.5px solid var(--teal-2);color:var(--teal-2);}
  .btn-navy{background:var(--navy);color:#fff;}
  .btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text-dim);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .actions{display:flex;gap:10px;margin-top:20px;}

  .upload-box{
    border:1.5px dashed var(--border);border-radius:10px;padding:18px;display:flex;gap:14px;align-items:center;background:var(--field);
  }
  .upload-icon{width:36px;height:36px;border-radius:8px;background:#1f1f1f;display:flex;align-items:center;justify-content:center;color:var(--teal-2);font-size:16px;flex:none;}
  .upload-box .t{font-size:13px;color:var(--teal-2);font-weight:600;text-decoration:underline;}
  .upload-box .s{font-size:11px;color:var(--text-faint);margin-top:2px;}

  .file-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--field);border:1px solid var(--border-soft);border-radius:8px;margin-top:10px;}
  .file-icon{width:30px;height:30px;border-radius:6px;background:#7a1f1f;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;}
  .file-row .name{font-size:13px;font-weight:600;}
  .file-row .sub{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  .info-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
  .info-line:last-child{border-bottom:none;}
  .info-line .k{color:var(--text-dim);}
  .info-line .v{font-weight:600;}
  .v.mono{font-family:'SF Mono',Consolas,monospace;font-size:12px;}

  .note{font-size:12px;color:var(--text-faint);margin-top:10px;line-height:1.5;}
  .note b{color:var(--text-dim);}

  .pay-instructions{
    margin-top:16px;background:var(--field);border:1px solid var(--border);border-radius:10px;padding:16px 18px;
  }
  .pay-instructions-head{margin-bottom:8px;}
  .pay-instructions-head .t{font-size:13px;font-weight:700;color:#fff;}
  .pay-instructions-head .s{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .pay-instructions .info-line{border-bottom:1px solid var(--border-soft);}
  .pay-instructions .info-line:last-of-type{border-bottom:none;}
  .btn-sm{padding:7px 14px;font-size:12px;margin-top:12px;}
  .lc-doc-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--field);border:1px solid var(--border-soft);border-radius:8px;margin:14px 0;}
  .lc-doc-row .file-icon{background:#1a3a4a;color:var(--teal-2);}
  .lc-doc-row .name{font-size:13px;font-weight:600;}
  .lc-doc-row .sub{font-size:11px;color:var(--text-faint);}
  .lc-doc-row .spacer{flex:1;}

  .empty-other-role{
    padding:40px 20px;text-align:center;color:var(--text-faint);font-size:13px;border:1px dashed var(--border-soft);border-radius:12px;
  }
  .empty-other-role b{color:var(--text-dim);display:block;margin-bottom:4px;font-size:14px;}

  .scrollhide::-webkit-scrollbar{width:6px;}
  .scrollhide::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--teal-2);color:#04212b;padding:12px 20px;
    border-radius:10px;font-size:13px;font-weight:700;z-index:999;opacity:0;transform:translateY(10px);
    transition:all .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.error{background:var(--red-soft);color:#ff6b6b;}

  /* ---------- RESET BUTTON ---------- */
  .reset-area{margin-top:20px;padding-top:16px;border-top:1px solid var(--border-soft);}
</style>
</head>
<body>

<div class="navbar">
  <div class="left">
    <div class="logo">MAKS</div>
    <div class="navlinks">
      <span class="active">Trade</span><span>Market</span><span>Wallet</span><span>Transactions</span>
    </div>
  </div>
  <div class="right">
    <span class="conn-status"><span class="conn-dot" id="connDot"></span><span id="connLabel">Connecting...</span></span>
    <div class="role-pill">
      <button id="btnExporter" class="active" onclick="setRole('exporter')">Exporter view</button>
      <button id="btnImporter" onclick="setRole('importer')">Importer view</button>
    </div>
    <div class="icon-btn">EX</div>
  </div>
</div>

<div class="app">
  <div class="sidebar scrollhide" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase config (REST API directly, no SDK dependency) ──
var SUPABASE_URL = 'https://bqkjhwrdkizdloiowioe.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxa2pod3Jka2l6ZGxvaW93aW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzY5ODIsImV4cCI6MjA5NzQxMjk4Mn0.qoxwgJj-9q6umT5C-rB2NHmoQg1wHESNHN5l7FeP-nI';
var DEAL_ID = 'demo-deal-1';

function apiHeaders(extra){
  var h = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  if(extra) Object.assign(h, extra);
  return h;
}

console.log('[MAKS] Ready, using REST API');

// ── Step definitions ──
const STEPS = [
  {id:1, lane:'exporter', who:'Exporter', what:'Offer quantity & pricing', holder:'—', detail:'offer'},
  {id:2, lane:'importer', who:'Importer', what:'Deal on price', holder:'—', detail:'deal'},
  {id:3, lane:'exporter', who:'Exporter', what:'Prepare shipping docs', holder:'—', detail:'docs'},
  {id:4, lane:'exporter', who:'Exporter', what:'Request Letter of Credit', holder:'—', detail:'request-lc'},
  {id:5, lane:'icc', who:'ICC', what:'Request payment', holder:'Escrow pending', detail:'request-payment'},
  {id:6, lane:'importer', who:'Importer', what:'Deposit funds', holder:'FIAT (importer)', detail:'deposit'},
  {id:8, lane:'icc', who:'ICC', what:'Issue Letter of Credit', holder:'IDRX (escrow)', detail:'issue-lc'},
  {id:9, lane:'exporter', who:'Exporter', what:'Proceed shipping', holder:'IDRX (escrow)', detail:'ship'},
  {id:10, lane:'importer', who:'Importer', what:'Confirm items', holder:'IDRX (escrow)', detail:'confirm'},
  {id:11, lane:'icc', who:'ICC', what:'Release funds', holder:'IDRX (exporter)', detail:'release'},
  {id:12, lane:'exporter', who:'Exporter', what:'Receive funds (IDRX) in PAKD', holder:'IDRX (exporter)', detail:'receive'},
  {id:13, lane:'exporter', who:'Exporter', what:'Withdraw IDRX to IDR', holder:'IDR (exporter)', detail:'sell'},
  {id:14, lane:'exporter', who:'Exporter', what:'Receive IDR in bank', holder:'IDR (bank)', detail:'bank'},
];

// ── Local state ──
let role = 'exporter';
let currentStepId = 1;
let completed = new Set([]);

// ── Supabase: fetch state ──
async function loadDealState(){
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/deal_state?id=eq.' + DEAL_ID + '&select=*', {
      headers: apiHeaders()
    });
    var data = await res.json();
    if(!res.ok){
      console.error('Load failed:', res.status, data);
      showToast('DB load failed (' + res.status + '). Run schema.sql first.', 'error');
      return;
    }
    if(Array.isArray(data) && data.length > 0){
      var d = data[0];
      currentStepId = d.current_step_id;
      completed = new Set(d.completed_steps || []);
      console.log('[MAKS] Loaded state: step', currentStepId, 'completed', Array.from(completed));
      render();
    }
  } catch(e){
    console.error('Load error:', e);
    showToast('Connection error. Check console.', 'error');
  }
}

// ── Last known state hash (to skip redundant renders) ──
let lastStateHash = '';

function stateHash(csid, comp){
  return csid + '|' + Array.from(comp).sort((a,b)=>a-b).join(',');
}

function applyRemoteState(data){
  if(!data) return;
  const hash = stateHash(data.current_step_id, new Set(data.completed_steps || []));
  if(hash === lastStateHash) return; // no change
  lastStateHash = hash;
  currentStepId = data.current_step_id;
  completed = new Set(data.completed_steps || []);
  render();
}

// ── Supabase: save state ──
async function saveDealState(){
  var csid = currentStepId;
  var comp = Array.from(completed);

  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/deal_state', {
      method: 'POST',
      headers: apiHeaders({'Prefer': 'resolution=merge-duplicates'}),
      body: JSON.stringify({
        id: DEAL_ID,
        current_step_id: csid,
        completed_steps: comp,
        updated_at: new Date().toISOString()
      })
    });
    if(!res.ok){
      var err = await res.text();
      console.error('Save failed:', res.status, err);
      showToast('Save failed: ' + res.status, 'error');
      return false;
    }

    lastStateHash = stateHash(csid, completed);
    console.log('[MAKS] Saved: step', csid, 'completed', comp);
    showToast('Saved');
    return true;
  } catch(e){
    console.error('Save error:', e);
    showToast('Save error. Check console.', 'error');
    return false;
  }
}

// ── Polling (reliable baseline sync) ──
var pollTimer = null;
async function pollDealState(){
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/deal_state?id=eq.' + DEAL_ID + '&select=*', {
      headers: apiHeaders()
    });
    if(!res.ok) return;
    var data = await res.json();
    if(Array.isArray(data) && data.length > 0){
      applyRemoteState(data[0]);
    }
  } catch(e){
    // silent retry
  }
}

function startPolling(){
  pollDealState();
  pollTimer = setInterval(pollDealState, 1500);
}

// ── Reset deal (for demo) ──
async function resetDeal(){
  currentStepId = 1;
  completed = new Set([]);
  await saveDealState();
  render();
  showToast('Deal reset to step 1');
}

// ── Toast ──
let toastTimer;
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.className='toast', 2500);
}

// ── Role switch ──
function setRole(r){
  role = r;
  document.getElementById('btnExporter').classList.toggle('active', r==='exporter');
  document.getElementById('btnImporter').classList.toggle('active', r==='importer');
  render();
}

// ── Step status ──
function statusOf(step){
  if(completed.has(step.id)) return 'done';
  if(step.id === currentStepId) return 'current';
  return 'pending';
}

// ── Advance ──
async function advance(){
  completed.add(currentStepId);
  var idx = STEPS.findIndex(function(s){return s.id===currentStepId;});

  if(idx < STEPS.length-1){
    currentStepId = STEPS[idx+1].id;
    var saved = await saveDealState();
    if(!saved) return;
    render();

    // If next step is ICC, auto-advance after a brief delay
    var nextStep = STEPS[idx+1];
    if(nextStep.lane === 'icc'){
      showToast('ICC processing...');
      setTimeout(async function(){
        completed.add(currentStepId);
        var nextIdx = STEPS.findIndex(function(s){return s.id===currentStepId;});
        if(nextIdx < STEPS.length-1){
          currentStepId = STEPS[nextIdx+1].id;
          await saveDealState();
          render();
          showToast('ICC step completed');
        }
      }, 1500);
    }
  }
}

// ── Step selection ──
function selectStep(id){
  currentStepId = id;
  render();
}

// ── Render sidebar ──
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  let html = `<h2>Deal timeline</h2>`;
  STEPS.forEach(step=>{
    const status = statusOf(step);
    const dim = (role==='exporter' && step.lane==='importer') || (role==='importer' && step.lane==='exporter');
    html += `<div class="tl-node ${step.lane} ${status} ${dim?'role-dim':''} ${currentStepId===step.id?'selected':''}" onclick="selectStep(${step.id})">
      <div class="who">${step.who}</div>
      <div class="what">${step.what}</div>
    </div>`;
  });
  const holder = STEPS.find(s=>s.id===currentStepId)?.holder || '—';
  html += `<div class="holder-pill"><div class="dot"></div><div><div class="label">Funds currently held by</div><div class="val">${holder}</div></div></div>`;
  html += `<div class="reset-area"><button class="btn btn-ghost btn-sm" onclick="resetDeal()">Reset deal</button></div>`;
  sb.innerHTML = html;
}

// ── Render main ──
function renderMain(){
  const main = document.getElementById('main');
  const step = STEPS.find(s=>s.id===currentStepId);
  const status = statusOf(step);
  const isMine = step.lane === role;
  const isIcc = step.lane === 'icc';

  let header = `
    <div class="deal-header">
      <div class="eyebrow">Letter of credit · Deal #—</div>
      <h1>${step.what}</h1>
      <div class="sub">${badge(status)} &nbsp;·&nbsp; Step ${step.id} of ${STEPS.length} &nbsp;·&nbsp; Owner: ${step.who}</div>
    </div>`;

  let body = '';

  if(isIcc || (!isMine && status!=='current')){
    body = `<div class="card">${otherRoleNotice(step)}</div>`;
    if(isIcc){
      body = `<div class="card"><h3>${step.what}</h3><div class="meta">Handled automatically by ICC escrow</div>${iccBody(step)}</div>`;
    }
  } else if(!isMine && status==='current'){
    body = `<div class="card">${otherRoleNotice(step)}</div>`;
  } else {
    body = `<div class="card"><h3>${step.what}</h3><div class="meta">Your action</div>${formFor(step)}</div>`;
  }

  main.innerHTML = header + body;
}

function badge(status){
  if(status==='done') return `<span class="status-badge done">Completed</span>`;
  if(status==='current') return `<span class="status-badge current">Action needed</span>`;
  return `<span class="status-badge pending">Pending</span>`;
}

function otherRoleNotice(step){
  const ownerLabel = step.lane === 'icc' ? 'ICC (automated)' : (step.lane.charAt(0).toUpperCase()+step.lane.slice(1));
  return `<div class="empty-other-role"><b>Waiting on ${ownerLabel}</b>This step is handled by the other side of the deal. You'll be notified the moment it's done.</div>`;
}

function iccBody(step){
  if(step.detail==='request-payment'){
    return `
      <div class="info-line"><span class="k">Amount due</span><span class="v">—</span></div>
      <div class="info-line"><span class="k">Converts to</span><span class="v">—</span></div>
      <div class="info-line"><span class="k">Escrow reference</span><span class="v mono">—</span></div>
      <div class="note">ICC has notified the importer to deposit funds. <b>No action needed from you.</b></div>`;
  }
  if(step.detail==='issue-lc'){
    return `
      <div class="info-line"><span class="k">Funds confirmed in escrow</span><span class="v">—</span></div>
      <div class="info-line"><span class="k">LC reference</span><span class="v mono">—</span></div>
      <div class="lc-doc-row">
        <div class="file-icon">PDF</div>
        <div><div class="name">Letter of Credit</div><div class="sub">Issued by ICC</div></div>
        <div class="spacer"></div>
        <button class="btn btn-outline btn-sm">Open</button>
        <button class="btn btn-ghost btn-sm">Download</button>
      </div>
      <div class="note">Letter of Credit issued to exporter. Shipping can proceed.</div>`;
  }
  if(step.detail==='release'){
    return `
      <div class="info-line"><span class="k">Items confirmed by importer</span><span class="v">—</span></div>
      <div class="info-line"><span class="k">Releasing</span><span class="v">—</span></div>
      <div class="note">Funds released from escrow to exporter's PAKD wallet.</div>`;
  }
  return `<div class="note">Automated escrow step.</div>`;
}

function formFor(step){
  switch(step.detail){
    case 'offer':
      return `
        <label>Product description</label>
        <textarea placeholder="Enter product description"></textarea>
        <div class="row2">
          <div><label>Quantity</label><input type="number" placeholder="Enter quantity"></div>
          <div><label>Unit price (USD)</label><input type="number" placeholder="Enter unit price"></div>
        </div>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Send offer</button><button class="btn btn-ghost">Save draft</button></div>`;
    case 'docs':
      return `
        <label>Bill of lading</label>
        <div class="upload-box"><div class="upload-icon">↑</div><div><div class="t">Upload file</div><div class="s">JPEG, PNG and PDF formats, up to 1MB</div></div></div>
        <label>Packing list</label>
        <div class="upload-box"><div class="upload-icon">↑</div><div><div class="t">Upload file</div><div class="s">JPEG, PNG and PDF formats, up to 1MB</div></div></div>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Submit documents</button></div>`;
    case 'request-lc':
      return `
        <div class="info-line"><span class="k">Deal value</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Importer</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Settlement rail</span><span class="v">—</span></div>
        <label>Notes to ICC (optional)</label>
        <textarea placeholder="Add context for the escrow request"></textarea>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Request Letter of Credit</button></div>`;
    case 'deposit':
      return `
        <div class="info-line"><span class="k">Amount requested</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Escrow reference</span><span class="v mono">—</span></div>
        <div class="pay-instructions">
          <div class="pay-instructions-head">
            <div class="t">Payment instructions</div>
            <div class="s">via TransFi · transfer the exact amount below</div>
          </div>
          <div class="info-line"><span class="k">Beneficiary name</span><span class="v">—</span></div>
          <div class="info-line"><span class="k">Bank name</span><span class="v">—</span></div>
          <div class="info-line"><span class="k">Account number</span><span class="v mono">—</span></div>
          <div class="info-line"><span class="k">SWIFT / BIC</span><span class="v mono">—</span></div>
          <div class="info-line"><span class="k">Bank address</span><span class="v">—</span></div>
          <div class="info-line"><span class="k">Amount to send</span><span class="v">—</span></div>
          <div class="info-line"><span class="k">Payment reference</span><span class="v mono">—</span></div>
          <button class="btn btn-outline btn-sm">Copy bank details</button>
        </div>
        <label>Deposit method</label>
        <select><option>Bank transfer (SWIFT)</option><option>Local wire</option></select>
        <label>Proof of transfer</label>
        <div class="upload-box"><div class="upload-icon">↑</div><div><div class="t">Upload file</div><div class="s">JPEG, PNG and PDF formats, up to 1MB</div></div></div>
        <div class="note">Funds are received via <b>TransFi</b> and converted automatically into IDRX before entering escrow. Always include the payment reference so TransFi can match your transfer.</div>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Confirm deposit</button></div>`;
    case 'confirm':
      return `
        <div class="info-line"><span class="k">Shipment status</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Items expected</span><span class="v">—</span></div>
        <label>Confirm condition</label>
        <select><option>Items received in good condition</option><option>Items received, discrepancy noted</option></select>
        <label>Notes (optional)</label>
        <textarea placeholder="Add any notes about the shipment"></textarea>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Confirm items received</button><button class="btn btn-outline">Report an issue</button></div>`;
    case 'ship':
      return `
        <div class="info-line"><span class="k">Letter of Credit</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Carrier</span><span class="v">—</span></div>
        <label>Tracking number</label>
        <input type="text" placeholder="Enter tracking number">
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Mark as shipped</button></div>`;
    case 'receive':
      return `
        <div class="info-line"><span class="k">Released from escrow</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Destination wallet</span><span class="v mono">—</span></div>
        <div class="note">Funds have arrived in your PAKD wallet.</div>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Continue to sell IDRX</button></div>`;
    case 'sell':
      return `
        <div class="info-line"><span class="k">Available balance</span><span class="v">—</span></div>
        <label>Amount to sell</label>
        <input type="text" placeholder="Enter amount">
        <div class="info-line"><span class="k">Rate</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">You'll receive</span><span class="v">—</span></div>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Withdraw IDRX</button></div>`;
    case 'bank':
      return `
        <div class="info-line"><span class="k">Amount</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Bank account</span><span class="v">—</span></div>
        <div class="info-line"><span class="k">Status</span><span class="v">—</span></div>
        <div class="note">Withdrawals typically settle within few hours.</div>
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Confirm withdrawal to IDR</button></div>`;
    case 'deal':
      return `
        <div class="info-line"><span class="k">Offer received</span><span class="v">—</span></div>
        <label>Counter price (optional)</label>
        <input type="text" placeholder="Leave blank to accept as-is">
        <div class="actions"><button class="btn btn-primary" onclick="advance()">Accept deal</button><button class="btn btn-outline">Send counter-offer</button></div>`;
    default:
      return `<div class="note">No action required.</div>`;
  }
}

  renderSidebar();
  renderMain();
}
